<!--
================================================================================
LOCAL MP3 ID3 EDITOR — NOTES & DOCUMENTATION BY AI (Claude Sonnet 4.6 Low)
================================================================================

OVERVIEW
--------
A single-file browser tool for editing ID3/MP4 metadata tags on local audio
files. All processing is done client-side — no uploads, no server.

LIBRARIES
---------
- jsmediatags 3.9.5   : Reading existing tags from MP3/M4A files
- JSZip 3.10.1        : Bundling multiple files into a ZIP for batch download
- FileSaver.js 2.0.5  : Triggering ZIP download in the browser

NOTE: browser-id3-writer was removed after proving unreliable (silent failures,
corrupted output rejected by strict parsers like Apple Music, Symfonium).
Tags are now written manually via buildID3Tag() and tagM4A().

--------------------------------------------------------------------------------
FILE TYPE DETECTION
--------------------------------------------------------------------------------
Many files downloaded from YouTube and similar sources are M4A (AAC audio in
an MP4 container) mislabeled with a .mp3 extension. detectFileType() inspects
the first bytes of the file to determine the real format:

  - 49 44 33         → ID3 header → real MP3
  - FF Ex / FF Fx    → MPEG sync bytes → real MP3
  - [size] 66 74 79 70 ("ftyp" at byte 4) → MP4/M4A container

Files that are detected as M4A are tagged using MP4 atoms and saved with a
.m4a extension. Files detected as real MP3 are tagged using ID3v2.3.

--------------------------------------------------------------------------------
MP3 TAGGING — buildID3Tag()
--------------------------------------------------------------------------------
Writes a spec-compliant ID3v2.3 tag manually as a Uint8Array, prepended to
the stripped audio data.

Structure:
  [ID3 header: 10 bytes]
    49 44 33        "ID3"
    03 00           version 2.3, revision 0
    00              flags
    xx xx xx xx     syncsafe integer: total frame size

  [Frames: variable]
    Each frame:
      4 bytes  frame ID (e.g. TIT2, TPE1)
      4 bytes  size (big-endian, NOT syncsafe at frame level in v2.3)
      2 bytes  flags (00 00)
      1 byte   encoding (01 = UTF-16)
      2 bytes  BOM (FF FE)
      n bytes  UTF-16LE string
      2 bytes  null terminator (00 00)

Frames written: TIT2 (title), TPE1 (artist), TALB (album),
                TRCK (track), TYER (year), TCON (genre)

stripExistingID3() removes any pre-existing ID3 tag from the front of the
buffer before prepending the new one, preventing double-tag corruption.

NOTE: ID3v1 tail tags (last 128 bytes, starting with "TAG") are not stripped.
Unlikely to cause issues in practice but technically leaves a stale tail tag.

--------------------------------------------------------------------------------
M4A TAGGING — tagM4A()
--------------------------------------------------------------------------------
Writes iTunes-compatible metadata atoms into the MP4 container without
transcoding. Keeps original AAC audio untouched.

Atom hierarchy written:
  moov
    udta  (any existing udta is stripped and replaced)
      meta
        hdlr  (handler type: mdir/appl — required by spec)
        ilst
          ©nam  title
          ©ART  artist
          ©alb  album
          ©day  year
          ©gen  genre
          trkn  track number (binary atom, not string)

String atoms use UTF-8 with data atom flags 0x00000001.
trkn uses binary data atom flags 0x00000000 with a 16-byte payload.

COMPATIBILITY
  Works:  Finder Quick Look, Musicolet (Android), Symfonium (Android), VLC
  Broken: Apple Music — requires strict atom ordering and possibly stco/mdat
          offset recalculation when moov is moved. Not worth pursuing.

--------------------------------------------------------------------------------
KNOWN EDGE CASES / FUTURE CONSIDERATIONS
--------------------------------------------------------------------------------
FILE FORMAT
  - 64-bit MP4 atoms: files >4GB use extended box sizes (size field = 1,
    real size follows as 8 bytes). Current parser would misread these.
    Unlikely for music files.

  - MP4 ftyp variants: M4A files may identify as "M4A ", "mp42", or "isom"
    rather than "dash". Detection relies on "ftyp" at byte 4, which is
    robust across all of these.

  - OGG / FLAC / WAV renamed as .mp3: not handled. Magic bytes are:
      FLAC → 66 4C 61 43 ("fLaC")
      OGG  → 4F 67 67 53 ("OggS")
      WAV  → 52 49 46 46 ("RIFF")
    Could be added to detectFileType() with a warning/skip.

  - moov after mdat: some downloaders place the moov atom at the end of the
    file. Most players handle this fine, but if issues arise, the fix is to
    move moov before mdat ("faststart" optimization).

ID3 SPECIFIC
  - ID3v2.4 input: jsmediatags reads v2.4 fine, but output is always v2.3.
    Broader compatibility, but technically a version downgrade.

  - Characters outside the Basic Multilingual Plane (emoji, some CJK):
    charCodeAt() breaks on surrogate pairs. Would need a proper UTF-16
    conversion using TextEncoder for full Unicode support.

UX
  - Duplicate filenames: if two different files share the same name,
    createInput()'s findIndex() lookup by filename will always match the
    first one, silently editing the wrong track.

================================================================================
-->

<script>
    // --- State Management ---
    let tracks = [];
    let isProcessing = false;

    // --- DOM Elements ---
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const statusMsg = document.getElementById('statusMsg');
    const controls = document.getElementById('controls');
    const tableContainer = document.getElementById('tableContainer');
    const tableBody = document.getElementById('tableBody');
    const fileCountSpan = document.getElementById('fileCount');

    // --- Hidden span for measuring ---
    const measureSpan = document.createElement('span');
    measureSpan.className = 'hidden-span';
    document.body.appendChild(measureSpan);

    // --- Event Listeners ---
    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if(!isProcessing) handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => {
        if(!isProcessing) handleFiles(e.target.files);
        fileInput.value = '';
    });

    document.getElementById('downloadAllBtn').addEventListener('click', downloadAllZip);

    // --- Core Logic ---

    async function handleFiles(fileList) {
        isProcessing = true;
        const mp3Files = Array.from(fileList).filter(f => f.name.toLowerCase().endsWith('.mp3'));

        if (mp3Files.length === 0) {
            statusMsg.textContent = "No MP3 files found.";
            isProcessing = false;
            return;
        }

        statusMsg.textContent = `Reading ${mp3Files.length} files...`;
        tableBody.innerHTML = '';
        tracks = [];

        try {
            for (let i = 0; i < mp3Files.length; i++) {
                const file = mp3Files[i];
                const tags = await readTags(file);

                const baseName = file.name.replace(/\.[^/.]+$/, "");

                const currentTags = {
                    ...tags,
                    title: tags.title || baseName,
                    artist: tags.artist || baseName,
                    album: tags.album || baseName,
                    track: tags.track || '',
                    year: tags.year || '',
                    genre: tags.genre || ''
                };

                tracks.push({
                    file: file,
                    originalTags: tags,
                    currentTags: currentTags,
                    filename: baseName
                });
            }

            renderTable();
            statusMsg.textContent = `${tracks.length} tracks loaded successfully.`;
            controls.style.display = 'flex';
            tableContainer.style.display = 'block';
            fileCountSpan.textContent = `${tracks.length} tracks`;
        } catch (err) {
            console.error(err);
            statusMsg.textContent = "Error processing files.";
        } finally {
            isProcessing = false;
        }
    }

    function readTags(file) {
        return new Promise((resolve) => {
            jsmediatags.read(file, {
                onSuccess: function(tag) {
                    const tags = tag.tags;
                    resolve({
                        title: tags.title,
                        artist: tags.artist,
                        album: tags.album,
                        track: tags.track ? tags.track.number : '',
                        year: tags.year,
                        genre: tags.genre
                    });
                },
                onError: function(error) {
                    console.warn(`Error reading ${file.name}:`, error);
                    resolve({});
                }
            });
        });
    }

    function renderTable() {
        tableBody.innerHTML = '';

        tracks.forEach((track, index) => {
            const row = document.createElement('tr');

            // 1. Title (Editable)
            const titleCell = createInput(track, 'title');

            // 2. Artist (Editable)
            const artistCell = createInput(track, 'artist');

            // 3. Album (Editable)
            const albumCell = createInput(track, 'album');

            // 4. Track Number (Editable)
            const trackNumCell = createInput(track, 'track', 'number');

            // 5. Year (Editable)
            const yearCell = createInput(track, 'year', 'number');

            // 6. Genre (Editable)
            const genreCell = createInput(track, 'genre');

            // 7. Action (Individual Download)
            const actionCell = document.createElement('td');
            const dlBtn = document.createElement('button');
            dlBtn.className = 'btn-select';
            // dlBtn.style.padding = '4px 8px';
            // dlBtn.style.fontSize = '0.8rem';
            // dlBtn.style.margin = '0 auto';
            // dlBtn.style.display = 'block';
            dlBtn.innerText = 'Download';
            dlBtn.onclick = () => downloadSingle(index);

            actionCell.appendChild(dlBtn);

            row.appendChild(titleCell);
            row.appendChild(artistCell);
            row.appendChild(albumCell);
            row.appendChild(trackNumCell);
            row.appendChild(yearCell);
            row.appendChild(genreCell);
            row.appendChild(actionCell);

            tableBody.appendChild(row);
        });
    }

    function createInput(trackObj, field, type = 'text') {
        const cell = document.createElement('td');
        const input = document.createElement('input');
        input.type = type;
        input.value = trackObj.currentTags[field] || '';
        input.dataset.index = trackObj.file.name;
        input.dataset.field = field;

        // Adjust width initially and on input
        adjustWidth(input);
        input.addEventListener('input', () => adjustWidth(input));

        input.addEventListener('input', (e) => {
            const idx = tracks.findIndex(t => t.file.name === e.target.dataset.index);
            if (idx !== -1) {
                tracks[idx].currentTags[e.target.dataset.field] = e.target.value;
            }
        });

        cell.appendChild(input);
        return cell;
    }

    function adjustWidth(input) {
        measureSpan.textContent = input.value || ' ';
        input.style.width = (measureSpan.offsetWidth + 0) + 'px'; // Add some buffer
        input.style.minWidth = '50px'; // Minimum width
    }

    // --- File Type Detection ---
    function detectFileType(buffer) {
        // Real MP3: starts with ID3 tag or sync bytes ff fb / ff f3 / ff f2
        if (buffer[0] === 0x49 && buffer[1] === 0x44 && buffer[2] === 0x33) return 'mp3';
        if (buffer[0] === 0xFF && (buffer[1] & 0xE0) === 0xE0) return 'mp3';
        // MP4/M4A: has ftyp box within first 12 bytes
        if (buffer[4] === 0x66 && buffer[5] === 0x74 && buffer[6] === 0x79 && buffer[7] === 0x70) return 'm4a';
        return 'unknown';
    }

    // --- MP4 Atom Helpers ---
    function readUint32BE(buf, offset) {
        return ((buf[offset] << 24) | (buf[offset+1] << 16) | (buf[offset+2] << 8) | buf[offset+3]) >>> 0;
    }

    function writeUint32BE(val) {
        return [(val >>> 24) & 0xFF, (val >>> 16) & 0xFF, (val >>> 8) & 0xFF, val & 0xFF];
    }

    function makeAtom(name, data) {
        const nameBytes = name.split('').map(c => c.charCodeAt(0));
        const size = 8 + data.length;
        return new Uint8Array([...writeUint32BE(size), ...nameBytes, ...data]);
    }

    function encodeStringAtom(fourcc, str) {
        // data atom: version(1) + flags(3) + locale(4) + utf8 string
        const strBytes = new TextEncoder().encode(str);
        const dataPayload = new Uint8Array([0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x00, ...strBytes]);
        const dataAtom = makeAtom('data', dataPayload);
        return makeAtom(fourcc, dataAtom);
    }

    function encodeTrackAtom(trackNum) {
        // trkn is binary: data atom with flags=0x00 and 8 bytes: 00 00, track, 00 00, 00 00, 00 00
        const num = parseInt(trackNum) || 0;
        const dataPayload = new Uint8Array([
            0x00, 0x00, 0x00, 0x00, // version + flags (implicit)
            0x00, 0x00, 0x00, 0x00, // locale
            0x00, 0x00,
            (num >> 8) & 0xFF, num & 0xFF,
            0x00, 0x00, 0x00, 0x00
        ]);
        const dataAtom = makeAtom('data', dataPayload);
        return makeAtom('trkn', dataAtom);
    }

    function buildIlst(tags) {
        const parts = [];
        if (tags.title)  parts.push(encodeStringAtom('\u00a9nam', tags.title));
        if (tags.artist) parts.push(encodeStringAtom('\u00a9ART', tags.artist));
        if (tags.album)  parts.push(encodeStringAtom('\u00a9alb', tags.album));
        if (tags.year)   parts.push(encodeStringAtom('\u00a9day', String(tags.year)));
        if (tags.genre)  parts.push(encodeStringAtom('\u00a9gen', tags.genre));
        if (tags.track)  parts.push(encodeTrackAtom(tags.track));

        const total = parts.reduce((s, p) => s + p.length, 0);
        const ilst = new Uint8Array(8 + total);
        const nameBytes = 'ilst'.split('').map(c => c.charCodeAt(0));
        ilst.set([...writeUint32BE(8 + total), ...nameBytes]);
        let offset = 8;
        for (const p of parts) { ilst.set(p, offset); offset += p.length; }
        return ilst;
    }

    function tagM4A(buffer, tags) {
        // Build ilst
        const ilst = buildIlst(tags);

        // hdlr atom for meta (required by spec)
        const hdlrPayload = new Uint8Array([
            0x00, 0x00, 0x00, 0x00, // version+flags
            0x00, 0x00, 0x00, 0x00, // pre_defined
            0x6d, 0x64, 0x69, 0x72, // handler_type: 'mdir'
            0x61, 0x70, 0x70, 0x6c, // 'appl'
            0x00, 0x00, 0x00, 0x00,
            0x00, 0x00, 0x00, 0x00,
            0x00                    // null string
        ]);
        const hdlr = makeAtom('hdlr', hdlrPayload);

        // meta atom (version + flags + hdlr + ilst)
        const metaPayload = new Uint8Array([0x00, 0x00, 0x00, 0x00, ...hdlr, ...ilst]);
        const meta = makeAtom('meta', metaPayload);

        // udta atom
        const udta = makeAtom('udta', meta);

        // Now find moov atom and inject udta, stripping any existing udta
        let i = 0;
        let moovStart = -1, moovEnd = -1;

        while (i < buffer.length - 8) {
            const boxSize = readUint32BE(buffer, i);
            const boxName = String.fromCharCode(buffer[i+4], buffer[i+5], buffer[i+6], buffer[i+7]);
            if (boxSize < 8) break;
            if (boxName === 'moov') {
                moovStart = i;
                moovEnd = i + boxSize;
                break;
            }
            i += boxSize;
        }

        if (moovStart === -1) throw new Error('No moov atom found');

        // Strip existing udta from moov contents
        const moovContents = [];
        let j = moovStart + 8;
        while (j < moovEnd - 8) {
            const boxSize = readUint32BE(buffer, j);
            const boxName = String.fromCharCode(buffer[j+4], buffer[j+5], buffer[j+6], buffer[j+7]);
            if (boxSize < 8) break;
            if (boxName !== 'udta') {
                moovContents.push(buffer.slice(j, j + boxSize));
            }
            j += boxSize;
        }

        // Append new udta
        moovContents.push(udta);
        const moovBody = moovContents.reduce((s, c) => s + c.length, 0);
        const newMoov = new Uint8Array(8 + moovBody);
        newMoov.set([...writeUint32BE(8 + moovBody), 0x6d, 0x6f, 0x6f, 0x76]); // 'moov'
        let off = 8;
        for (const c of moovContents) { newMoov.set(c, off); off += c.length; }

        // Reassemble: everything before moov + new moov + everything after moov
        const before = buffer.slice(0, moovStart);
        const after = buffer.slice(moovEnd);
        const output = new Uint8Array(before.length + newMoov.length + after.length);
        output.set(before, 0);
        output.set(newMoov, before.length);
        output.set(after, before.length + newMoov.length);
        return output;
    }

    function buildID3Tag(tags) {
        const frames = [];

        function encodeFrame(id, value) {
            const str = String(value);
            // UTF-16LE with BOM: 1 byte encoding + 2 bytes BOM + 2 bytes per char + 2 bytes null terminator
            const frameData = new Uint8Array(1 + 2 + str.length * 2 + 2);
            let pos = 0;
            frameData[pos++] = 0x01; // UTF-16 encoding
            frameData[pos++] = 0xFF; // BOM
            frameData[pos++] = 0xFE;
            for (let i = 0; i < str.length; i++) {
                const code = str.charCodeAt(i);
                frameData[pos++] = code & 0xFF;
                frameData[pos++] = (code >> 8) & 0xFF;
            }
            frameData[pos++] = 0x00; // null terminator
            frameData[pos++] = 0x00;

            const size = frameData.length;
            const frame = new Uint8Array(10 + size);
            frame[0] = id.charCodeAt(0);
            frame[1] = id.charCodeAt(1);
            frame[2] = id.charCodeAt(2);
            frame[3] = id.charCodeAt(3);
            frame[4] = (size >> 24) & 0xFF;
            frame[5] = (size >> 16) & 0xFF;
            frame[6] = (size >> 8) & 0xFF;
            frame[7] = size & 0xFF;
            frame[8] = 0x00; // flags
            frame[9] = 0x00;
            frame.set(frameData, 10);

            frames.push(frame);
        }

        if (tags.title)  encodeFrame('TIT2', tags.title);
        if (tags.artist) encodeFrame('TPE1', tags.artist);
        if (tags.album)  encodeFrame('TALB', tags.album);
        if (tags.track)  encodeFrame('TRCK', tags.track);
        if (tags.year)   encodeFrame('TYER', tags.year);
        if (tags.genre)  encodeFrame('TCON', tags.genre);

        const totalFrameSize = frames.reduce((sum, f) => sum + f.length, 0);

        const id3 = new Uint8Array(10 + totalFrameSize);
        id3[0] = 0x49; id3[1] = 0x44; id3[2] = 0x33; // "ID3"
        id3[3] = 0x03; id3[4] = 0x00;                 // version 2.3
        id3[5] = 0x00;                                 // flags
        // syncsafe integer size
        id3[6] = (totalFrameSize >> 21) & 0x7F;
        id3[7] = (totalFrameSize >> 14) & 0x7F;
        id3[8] = (totalFrameSize >> 7)  & 0x7F;
        id3[9] =  totalFrameSize        & 0x7F;

        let offset = 10;
        for (const frame of frames) {
            id3.set(frame, offset);
            offset += frame.length;
        }

        return id3;
    }

    function stripExistingID3(buffer) {
        // Check for ID3 header: "ID3" at byte 0
        if (buffer[0] === 0x49 && buffer[1] === 0x44 && buffer[2] === 0x33) {
            // Syncsafe integer size at bytes 6-9
            const size = ((buffer[6] & 0x7F) << 21) |
                         ((buffer[7] & 0x7F) << 14) |
                         ((buffer[8] & 0x7F) << 7)  |
                          (buffer[9] & 0x7F);
            const tagTotalSize = 10 + size;
            // Return buffer starting after the existing tag
            return buffer.slice(tagTotalSize);
        }
        return buffer; // No ID3 tag found, return as-is
    }

    function downloadSingle(index) {
        const track = tracks[index];

        const tagsToWrite = {};
        for (const [key, value] of Object.entries(track.currentTags)) {
            if (value) tagsToWrite[key] = value;
        }

        try {
            const reader = new FileReader();

            reader.onload = function(e) {
                const originalBuffer = new Uint8Array(e.target.result);
                const fileType = detectFileType(originalBuffer);

                let output, filename, mimeType;

                if (fileType === 'm4a') {
                    output = tagM4A(originalBuffer, tagsToWrite);
                    filename = track.file.name.replace(/\.mp3$/i, '.m4a');
                    mimeType = 'audio/mp4';
                } else {
                    const stripped = stripExistingID3(originalBuffer);
                    const id3Tag = buildID3Tag(tagsToWrite);
                    output = new Uint8Array(id3Tag.length + stripped.length);
                    output.set(id3Tag, 0);
                    output.set(stripped, id3Tag.length);
                    filename = track.file.name;
                    mimeType = 'audio/mpeg';
                }

                const blob = new Blob([output], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            reader.onerror = function() {
                alert('Error reading file: ' + reader.error);
            };
            reader.readAsArrayBuffer(track.file);
        } catch (e) {
            alert('Error writing tags: ' + e.message);
            console.error(e);
        }
    }

    async function downloadAllZip() {
        if (tracks.length === 0) return;
        isProcessing = true;
        statusMsg.textContent = "Zipping and writing tags...";

        const zip = new JSZip();
        const folder = zip.folder("edited_mp3s");

        try {
            for (let i = 0; i < tracks.length; i++) {
                const track = tracks[i];

                const tagsToWrite = {};
                for (const [key, value] of Object.entries(track.currentTags)) {
                    if (value) tagsToWrite[key] = value;
                }

                try {
                    const arrayBuffer = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = () => resolve(reader.result);
                        reader.onerror = () => reject(reader.error);
                        reader.readAsArrayBuffer(track.file);
                    });

                    const originalBuffer = new Uint8Array(arrayBuffer);
                    const fileType = detectFileType(originalBuffer);
                    let output, filename;

                    if (fileType === 'm4a') {
                        output = tagM4A(originalBuffer, tagsToWrite);
                        filename = track.file.name.replace(/\.mp3$/i, '.m4a');
                    } else {
                        const stripped = stripExistingID3(originalBuffer);
                        const id3Tag = buildID3Tag(tagsToWrite);
                        output = new Uint8Array(id3Tag.length + stripped.length);
                        output.set(id3Tag, 0);
                        output.set(stripped, id3Tag.length);
                        filename = track.file.name;
                    }

                    folder.file(filename, output);

                } catch (err) {
                    console.error("Error writing", track.file.name, err);
                    folder.file(track.file.name, track.file);
                }
            }

            const content = await zip.generateAsync({ type: "blob" });
            saveAs(content, "edited_mp3s.zip");
            statusMsg.textContent = "Download started!";
        } catch (e) {
            console.error(e);
            statusMsg.textContent = "Error creating ZIP.";
        } finally {
            isProcessing = false;
        }
    }
