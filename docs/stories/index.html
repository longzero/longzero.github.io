
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Stories</title>

    <style>
      :root {
          --accent-color: #333;
          --bg-color: #000;
          --gap: 20px;
          --grid-min: 130px;
          --text-color: #fff;
      }

      * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
      }

      body {
          background-color: var(--bg-color);
          color: var(--text-color);
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          overflow-x: hidden;
      }

      /* Mode Switcher UI */
      .controls {
          backdrop-filter: blur(10px);
          background: rgba(20, 20, 20, 0.8);
          /* border: 1px solid rgba(255, 255, 255, 0.1); */
          border-radius: 30px;
          top: 5px;
          /* box-shadow: 0 4px 20px rgba(0,0,0,0.5); */
          display: flex;
          /* gap: 10px; */
          left: 5px;
          opacity: .5;
          padding: 5px;
          position: fixed;
          transition: opacity .2s;
          z-index: 1000;
      }

      .controls button {
          background: transparent;
          border: none;
          border-radius: 20px;
          color: rgba(255, 255, 255, 0.6);
          cursor: pointer;
          font-size: 12px;
          font-weight: 500;
          padding: 5px;
          transition: color 0.2s, background 0.2s;
      }

      .controls button.active {
          background: rgba(255, 255, 255, 0.1);
          color: #fff;
      }

      .controls button:hover {
          color: #fff;
      }

      .controls:hover {
          opacity: 1;
      }

      /* Gallery Base */
      .gallery {
          display: block;
          height: 100vh;
          width: 100%;
      }

      .story-item {
          align-items: center;
          background: #000;
          contain-intrinsic-size: 1080px 1920px;
          content-visibility: auto;
          display: flex;
          justify-content: center;
          position: relative; /* For caption overlay */
      }

      .story-item-media {
          align-items: center;
          display: flex;
          height: 100%;
          justify-content: center;
          width: 100%;
      }

      .story-item-media img,
      .story-item-media video {
          display: block;
          max-height: 100%;
          max-width: 100%;
          object-fit: contain; /* Contain for full-screen modes */
      }

      .mode-grid .story-item-media img,
      .mode-grid .story-item-media video {
          aspect-ratio: 9 / 16;
          height: auto;
          object-fit: cover; /* Cover for grid view */
          width: 100%;
      }

      .mode-grid .story-item a {
        color: #fff;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 10px;
        position: absolute;
        top: 0;
        left: 0;
        text-decoration: none;
        width: 100%;
        height: 100%;
      }

      .story-caption {
          bottom: 15px;
          color: rgba(255, 255, 255, 0.5);
          font-size: 10px;
          left: 15px;
          position: absolute;
          text-shadow: 0 1px 2px rgba(0,0,0,0.8);
          z-index: 10;
      }

      .story-caption a {
          color: inherit;
          text-decoration: none;
      }

      /* Mode: Grid */
      .gallery--grid {
          display: grid;
          gap: var(--gap);
          /* grid-template-columns: repeat(3, 1fr); */
          grid-template-columns: repeat(auto-fill, minmax(var(--grid-min), 1fr));
          height: 100vh;
          overflow-y: auto;
          padding: var(--gap);
      }

      @media (min-width: 680px) {
          .gallery--grid {
              /* grid-template-columns: repeat(auto-fill, minmax(var(--grid-min), 1fr)); */
          }
      }

      /* Video Indicator Badge for Grid */
      .video-indicator {
          align-items: center;
          background: rgba(0, 0, 0, 0.4);
          backdrop-filter: blur(4px);
          border-radius: 50%;
          color: white;
          display: none;
          height: 30px;
          justify-content: center;
          pointer-events: none;
          position: absolute;
          right: 10px;
          top: 10px;
          width: 30px;
          z-index: 5;
      }

      .mode-grid .is-video .video-indicator {
          display: flex;
      }

      .gallery--grid .story-item {
          aspect-ratio: auto; /* Let content define height */
          flex-direction: column;
          height: auto;
      }

      .gallery--grid .story-item img,
      .gallery--grid .story-item video {
          height: auto;
          width: 100%;
      }

      .gallery--grid .story-caption {
          bottom: auto;
          left: auto;
          margin-top: 8px;
          position: static;
          text-align: center;
          width: 100%;
      }

      /* Mode: Vertical */
      .gallery--vertical {
          display: block;
          height: 100vh;
          overflow-y: auto;
          scroll-snap-type: y mandatory;
      }

      .gallery--vertical .story-item {
          height: 100vh;
          scroll-snap-align: center;
          width: 100%;
      }

      /* Mode: Horizontal */
      .gallery--horizontal {
          display: flex;
          flex-direction: row;
          height: 100vh;
          overflow-x: auto;
          overflow-y: hidden;
          scroll-behavior: auto;
          scroll-snap-type: x mandatory;
          width: 100vw;
      }

      .gallery--horizontal .story-item {
          flex: 0 0 auto;
          height: 100vh;
          max-width: 100vw; /* Never wider than the screen */
          scroll-snap-align: start;
          width: auto;
      }

      .gallery--horizontal .story-item img,
      .gallery--horizontal .story-item video {
          height: 100vh;
          max-width: 100vw; /* Never wider than the screen */
          width: auto;
      }

      /* Mode: Slider */
      .gallery--slider {
          display: flex;
          height: 100vh;
          overflow-x: auto;
          overflow-y: hidden;
          scroll-behavior: auto;
          scroll-snap-type: x mandatory;
          scrollbar-width: none;
          width: 100vw;
      }

      .gallery--slider::-webkit-scrollbar {
          display: none;
      }

      .gallery--slider .story-item {
          flex: 0 0 100vw;
          height: 100vh;
          scroll-snap-align: center;
      }

      /* Slider Navigation Arrows */
      .slider-nav {
          display: none;
          height: 100%;
          justify-content: space-between;
          padding: 0 5px;
          pointer-events: none;
          position: fixed;
          top: 50%;
          transform: translateY(-50%);
          width: 100%;
          z-index: 900;
      }

      .gallery--slider + .slider-nav {
          display: flex;
      }

      .nav-btn {
          --size: 20px;
          align-items: center;
          /* backdrop-filter: blur(5px); */
          background: rgba(255, 255, 255, 0.1);
          border: none;
          color: #fff;
          cursor: pointer;
          display: flex;
          font-size: 14px;
          height: 100%;
          justify-content: center;
          opacity: 0;
          pointer-events: auto;
          transition: transform 0.2s, background 0.2s;
          width: 20%;
      }

      .nav-btn:hover {
          /* background: rgba(255, 255, 255, 0.2); */
          /* transform: scale(1.1); */
      }

      /* Hide specific elements based on mode */
      body:not(.mode-slider) .slider-nav {
          display: none;
      }

      /* Custom Dark Scrollbars */
      ::-webkit-scrollbar {
          height: 8px;
          width: 8px;
      }

      ::-webkit-scrollbar-track {
          background: #000;
      }

      ::-webkit-scrollbar-thumb {
          background: #222;
          border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
          background: #333;
      }

      /* Firefox support */
      * {
          scrollbar-color: #222 #000;
          scrollbar-width: thin;
      }

      /* Google Photos Style Timeline Scrubber */
      .timeline-sidebar {
          --timeline-center: 20px; /* Adjust this to move the entire scrubber */
          bottom: 20px;
          opacity: 0;
          pointer-events: none;
          position: fixed;
          right: 0;
          top: 60px;
          transition: opacity 0.3s;
          width: 150px; /* Increase width to cover tooltips */
          z-index: 1000;
      }

      .timeline-sidebar.visible {
          opacity: 1;
          pointer-events: auto;
      }

      .timeline-track {
          background: rgba(255, 255, 255, 0.1);
          border-radius: 2px;
          height: 100%;
          position: absolute;
          right: calc(var(--timeline-center) - 1px);
          width: 2px;
      }

      .timeline-handle {
          align-items: center;
          background: var(--text-color);
          border-radius: 10px;
          display: flex;
          height: 20px;
          justify-content: center;
          position: absolute;
          right: var(--timeline-center);
          transform: translate(50%, -50%);
          width: 4px;
      }

      .timeline-tooltip {
          background: rgba(255, 255, 255, 0.9);
          border-radius: 4px;
          color: #000;
          font-size: 11px;
          font-weight: 600;
          padding: 4px 8px;
          position: absolute;
          right: 12px; /* Relative to handle's 4px width/center */
          top: 50%;
          transform: translateY(-50%);
          white-space: nowrap;
      }

      .timeline-tick {
          color: rgba(255, 255, 255, 0.5);
          font-size: 10px;
          position: absolute;
          right: var(--timeline-center);
          transform: translate(50%, -50%);
          white-space: nowrap;
      }

      .timeline-tick.year {
          color: #fff;
          font-weight: bold;
          padding-right: 40px;
      }

      .timeline-tick.dot {
          background: rgba(255, 255, 255, 0.3);
          border-radius: 50%;
          height: 4px;
          width: 4px;
      }

      /* Preview Tooltip (Follows Cursor) */
      .timeline-preview {
          display: none;
          height: 2px;
          pointer-events: none;
          position: absolute;
          right: var(--timeline-center);
          transform: translate(50%, -50%);
          width: 10px;
          z-index: 1001;
      }

      .timeline-sidebar:hover .timeline-preview {
          display: block;
      }

      .timeline-preview-line {
          background: rgba(255, 255, 255, 0.5);
          height: 1px;
          position: absolute;
          right: 0;
          top: 50%;
          width: 15px;
      }

      .timeline-preview-text {
          background: rgba(0, 0, 0, 0.8);
          border: 1px solid rgba(255, 255, 255, 0.3);
          border-radius: 4px;
          color: #fff;
          cursor: pointer;
          font-size: 11px;
          padding: 4px 8px;
          pointer-events: auto; /* Make the tooltip clickable */
          position: absolute;
          right: 20px;
          top: 50%;
          transform: translateY(-50%);
          white-space: nowrap;
      }

    </style>
</head>
<body class="mode-slider">

    <div id="gallery" class="gallery gallery--grid">
        <!-- Content loaded dynamically via JS -->
        <div class="loading-state" style="display: flex; height: 100vh; align-items: center; justify-content: center; color: #555;">
            Loading stories...
        </div>
    </div>

    <!-- Navigation Overlay for Slider -->
    <div class="slider-nav">
        <button class="nav-btn" onclick="moveSlider(-1)">&#10094;</button>
        <button class="nav-btn" onclick="moveSlider(1)">&#10095;</button>
    </div>

    <div class="controls">
        <button onclick="setMode('grid')" id="btn-grid">Grid</button>
        <button onclick="setMode('vertical')" id="btn-vertical">Vertical</button>
        <button onclick="setMode('horizontal')" id="btn-horizontal">Horizontal</button>
        <button onclick="setMode('slider')" id="btn-slider" class="active">Slider</button>
    </div>

    <!-- Timeline Scrubber UI -->
    <div id="timeline" class="timeline-sidebar">
        <div class="timeline-track"></div>
        <div id="timeline-marks"></div>
        <!-- The Current Position Handle -->
        <div id="timeline-handle" class="timeline-handle">
            <div id="timeline-tooltip" class="timeline-tooltip">Feb 2026</div>
        </div>
        <!-- The Hover Preview (Fixed to Cursor) -->
        <div id="timeline-preview" class="timeline-preview">
            <div class="timeline-preview-line"></div>
            <div id="timeline-preview-text" class="timeline-preview-text">YYYY-MM-DD</div>
        </div>
    </div>

    <script>
        /**
         * CONFIGURATION
         * Update these values to match your image server.
         */
        // const BASE_URL = 'http://playground.local/stories';
        const BASE_URL = 'https://longdesigns.com/stories';
        const API_URL = `${BASE_URL}/list.php`;   // Path to the PHP script
        const API_KEY = 'st_8a2b_9f41de3c6e'; // Must match the secret in list.php

        // Settings
        const START_IMAGE = "IMG_20260214_063742_742.jpg"; // Filename to prioritize on first load or null

        // State
        let gallery = document.getElementById('gallery');
        let items = [];
        let buttons = document.querySelectorAll('.controls button');
        let currentPhotoIndex = 0;

        /**
         * DYNAMIC LOADING
         */
        async function loadGallery() {
            try {
                const response = await fetch(API_URL, {
                    headers: { 'X-API-KEY': API_KEY }
                });

                if (!response.ok) throw new Error('Failed to load gallery inventory');

                const data = await response.json();
                const imagePaths = data.images || [];

                if (imagePaths.length === 0) {
                    gallery.innerHTML = '<div style="padding: 40px; text-align: center; color: #555;">No images found.</div>';
                    return;
                }

                // Build Gallery Items
                gallery.innerHTML = imagePaths.map(path => {
                    const fullSrc = `${BASE_URL}/${path}`;
                    const filename = path.split('/').pop();
                    const isVideo = /\.(mp4|mov|m4v|webm)$/i.test(path);

                    const url = new URL(window.location.pathname, window.location.origin);
                    url.searchParams.set('mode', 'slider');
                    url.searchParams.set('story', filename);
                    const link = url.toString();

                    let mediaHtml = '';
                    let videoClass = isVideo ? 'is-video' : '';
                    if (isVideo) {
                        mediaHtml = `<video data-src="${fullSrc}" muted controls loop playsinline preload="metadata"></video>
                                     <div class="video-indicator">▶</div>`;
                    } else {
                        mediaHtml = `<img src="${fullSrc}" loading="lazy" decoding="async" alt="Story">`;
                    }

                    return `
                        <figure class="story-item ${videoClass}">
                            <div class="story-item-media">${mediaHtml}</div>
                            <figcaption class="story-caption"><a href="${link}">${filename}</a></figcaption>
                        </figure>
                    `;
                }).join('');

                // Refresh DOM references
                items = document.querySelectorAll('.story-item');

                // Generate Timeline Marks
                generateTimeline(imagePaths);

                // Initialize Dynamic Priority Lazy Video Thumbnails (Max 2 at once)
                let videoQueue = [];
                let activeLoads = 0;
                const MAX_CONCURRENT_LOADS = 2;

                const processVideoQueue = () => {
                    if (activeLoads >= MAX_CONCURRENT_LOADS || videoQueue.length === 0) return;

                    // LIFO: Take the LAST item added to the queue (most recently visible)
                    const video = videoQueue.pop();
                    activeLoads++;

                    const onMetadataLoaded = () => {
                        video.removeEventListener('loadedmetadata', onMetadataLoaded);
                        video.removeEventListener('error', onMetadataLoaded);
                        activeLoads--;
                        processVideoQueue();
                    };

                    video.addEventListener('loadedmetadata', onMetadataLoaded);
                    video.addEventListener('error', onMetadataLoaded);

                    if (!video.src && video.getAttribute('data-src')) {
                        video.src = video.getAttribute('data-src');
                        video.load();
                    } else {
                        onMetadataLoaded();
                    }
                };

                const videoObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const video = entry.target;
                        if (entry.isIntersecting) {
                            // Only add if it's not already in the queue and hasn't loaded yet
                            if (!video.src && !videoQueue.includes(video)) {
                                videoQueue.push(video);
                                processVideoQueue();
                            }
                        } else {
                            // If it leaves the view before it started loading, remove it from queue
                            const index = videoQueue.indexOf(video);
                            if (index !== -1) {
                                videoQueue.splice(index, 1);
                            }
                        }
                    });
                }, { rootMargin: '300px' });

                document.querySelectorAll('.story-item video').forEach(v => videoObserver.observe(v));

                // Continue with initialization
                init();

            } catch (err) {
                console.error('Gallery error:', err);
                gallery.innerHTML = '<div style="padding: 40px; text-align: center; color: #e74c3c;">Error loading gallery. Check CORS and API key.</div>';
            }
        }

        /**
         * CORE LOGIC
         */
        function setMode(mode, updateURL = true) {
            document.body.className = `mode-${mode}`;
            gallery.className = `gallery gallery--${mode}`;

            buttons.forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${mode}`);
            if (activeBtn) activeBtn.classList.add('active');

            requestAnimationFrame(() => {
                scrollToPhoto(currentPhotoIndex);
            });

            localStorage.setItem('stories_mode', mode);
            if (updateURL) syncURL();
        }

        function scrollToPhoto(index) {
            if (!items.length || index < 0 || index >= items.length) return;
            currentPhotoIndex = index;
            const item = items[index];

            // To ensure a perfectly instant jump (no browser snapping animation),
            // we temporarily disable snap-type, jump, and then re-enable it.
            const originalSnap = gallery.style.scrollSnapType;
            gallery.style.scrollSnapType = 'none';

            if (document.body.classList.contains('mode-slider') || document.body.classList.contains('mode-horizontal')) {
                gallery.scrollTo({ left: item.offsetLeft, behavior: 'auto' });
            } else {
                item.scrollIntoView({ behavior: 'auto' });
            }

            // Restore snapping for touch/swipe gestures
            requestAnimationFrame(() => {
                gallery.style.scrollSnapType = originalSnap;
            });
        }

        function moveSlider(dir) {
            const newIndex = Math.max(0, Math.min(items.length - 1, currentPhotoIndex + dir));
            if (newIndex !== currentPhotoIndex) {
                currentPhotoIndex = newIndex;
                scrollToPhoto(currentPhotoIndex);
                syncURL();
            }
        }

        function syncURL() {
            const mode = document.body.className.replace('mode-', '');
            const url = new URL(window.location);
            url.searchParams.set('mode', mode);

            // Get current filename and handle video play state
            const currentItem = items[currentPhotoIndex];
            const currentMedia = currentItem?.querySelector('img, video');

            if (currentMedia) {
                // Determine source (handles both immediate src and lazy data-src)
                const source = currentMedia.src || currentMedia.getAttribute('data-src') || '';
                const filename = source.split('/').pop();
                url.searchParams.set('story', filename);
                localStorage.setItem('stories_last_story', filename);

                // 1. Pause all videos first
                document.querySelectorAll('.story-item video').forEach(v => v.pause());

                // 2. Hydrate and Play ONLY the current media if it's a video
                if (currentMedia.tagName === 'VIDEO') {
                    // If this is the current video and it hasn't loaded its source yet
                    if (!currentMedia.src && currentMedia.getAttribute('data-src')) {
                        currentMedia.src = currentMedia.getAttribute('data-src');
                        currentMedia.load(); // Trigger the load now that we have a src
                    }
                    currentMedia.play().catch(e => console.log("Video autoplay blocked", e));
                }
            }

            window.history.replaceState({}, '', url);
        }

        function init() {
            const params = new URLSearchParams(window.location.search);

            const savedMode = localStorage.getItem('stories_mode') || 'slider';
            const mode = params.get('mode') || savedMode;

            const savedStory = localStorage.getItem('stories_last_story');
            const urlStory = params.get('story');
            const targetStory = urlStory || savedStory || START_IMAGE;

            let startIndex = 0;
            if (targetStory) {
                const index = Array.from(items).findIndex(item => {
                    const media = item.querySelector('img, video');
                    const source = media ? (media.src || media.getAttribute('data-src') || '') : '';
                    return media && source.includes(targetStory);
                });
                if (index !== -1) startIndex = index;
            }

            setMode(mode, false);

            setTimeout(() => {
                scrollToPhoto(startIndex);
                syncURL();
            }, 100);
        }

        // Debounced Scroll Tracker
        let scrollTimeout;
        gallery.addEventListener('scroll', () => {
            clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(() => {
                if (!items.length) return;

                const isVerticalControl = document.body.classList.contains('mode-vertical') ||
                                          document.body.classList.contains('mode-grid');
                const scrollPos = isVerticalControl ? gallery.scrollTop : gallery.scrollLeft;
                const clientDim = isVerticalControl ? gallery.clientHeight : gallery.clientWidth;
                const center = scrollPos + (clientDim / 2);

                let closestIndex = 0;
                let minDistance = Infinity;

                items.forEach((item, index) => {
                    const itemPos = isVerticalControl ? item.offsetTop : item.offsetLeft;
                    const itemDim = isVerticalControl ? item.clientHeight : item.clientWidth;
                    const itemCenter = itemPos + (itemDim / 2);

                    const distance = Math.abs(itemCenter - center);
                    if (distance < minDistance) {
                        minDistance = distance;
                        closestIndex = index;
                    }
                });

                if (closestIndex !== currentPhotoIndex) {
                    currentPhotoIndex = closestIndex;
                    syncURL();
                    updateTimelineUI();
                } else if (isVertical) {
                    // Update timeline position even if index hasn't changed (for precision)
                    updateTimelineUI();
                }
            }, 100);
        });

        // Keyboard Support
        window.addEventListener('keydown', (e) => {
            // Respect system shortcuts (don't interfere if Cmd, Ctrl, Shift, or Alt are pressed)
            if (e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;

            if (document.body.classList.contains('mode-slider')) {
                if (e.key === 'ArrowLeft') moveSlider(-1);
                if (e.key === 'ArrowRight') moveSlider(1);
            }
            if (document.body.classList.contains('mode-horizontal')) {
                if (e.key === 'ArrowLeft') gallery.scrollBy({ left: -window.innerWidth / 2, behavior: 'auto' });
                if (e.key === 'ArrowRight') gallery.scrollBy({ left: window.innerWidth / 2, behavior: 'auto' });
            }
            if (document.body.classList.contains('mode-vertical')) {
                if (e.key === 'ArrowUp') gallery.scrollBy({ top: -window.innerHeight / 2, behavior: 'auto' });
                if (e.key === 'ArrowDown') gallery.scrollBy({ top: window.innerHeight / 2, behavior: 'auto' });
            }
        });

        /**
         * TIMELINE SCRUBBER LOGIC
         */
        function generateTimeline(paths) {
            const marksContainer = document.getElementById('timeline-marks');
            marksContainer.innerHTML = '';

            const dates = paths.map(p => {
                const match = p.match(/(\d{4})(\d{2})(\d{2})/);
                return match ? {
                    year: match[1],
                    month: match[2],
                    label: new Date(match[1], match[2]-1).toLocaleString('default', { month: 'short' }) + ' ' + match[1]
                } : null;
            }).filter(d => d);

            if (dates.length < 2) return;

            // Group by Year/Month to place Ticks
            const years = [...new Set(dates.map(d => d.year))].sort().reverse();
            years.forEach((year, idx) => {
                const pos = (idx / (years.length || 1)) * 100;
                const el = document.createElement('div');
                el.className = 'timeline-tick year';
                el.style.top = `${pos}%`;
                el.textContent = year;

                // Jump to Year on click
                el.style.pointerEvents = 'auto'; // Re-enable for the label
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const targetIdx = Array.from(items).findIndex(item => {
                        const media = item.querySelector('img, video');
                        const source = media ? (media.src || media.getAttribute('data-src') || '') : '';
                        return source.includes(`_${year}`);
                    });
                    if (targetIdx !== -1) {
                        scrollToPhoto(targetIdx);
                        syncURL();
                    }
                });

                marksContainer.appendChild(el);
            });
        }

        let timelineTimeout;
        let isScrubbing = false;
        let isTimelineHovered = false;

        function updateTimelineUI() {
            const timeline = document.getElementById('timeline');
            const handle = document.getElementById('timeline-handle');
            const tooltip = document.getElementById('timeline-tooltip');

            if (!items.length) return;

            // Only show in vertical modes
            const isVerticalMode = document.body.classList.contains('mode-grid') ||
                                 document.body.classList.contains('mode-vertical');

            if (!isVerticalMode) {
                timeline.classList.remove('visible');
                return;
            }

            // Show timeline
            timeline.classList.add('visible');

            // Only set hide timeout if not being interacted with
            clearTimeout(timelineTimeout);
            if (!isTimelineHovered && !isScrubbing) {
                timelineTimeout = setTimeout(() => timeline.classList.remove('visible'), 2000);
            }

            // Calculate Position
            const scrollPercent = gallery.scrollTop / (gallery.scrollHeight - gallery.clientHeight);
            handle.style.top = `${scrollPercent * 100}%`;

            // Update Tooltip based on current visible item
            const currentItem = items[currentPhotoIndex];
            const media = currentItem?.querySelector('img, video');
            const source = media ? (media.src || media.getAttribute('data-src') || '') : '';
            const match = source.match(/(\d{4})(\d{2})(\d{2})/);
            if (match) {
                // Format: YYYY-MM-DD
                tooltip.textContent = `${match[1]}-${match[2]}-${match[3]}`;
            }
        }

        // Timeline Interaction Setup
        document.getElementById('timeline').addEventListener('mouseenter', () => {
            isTimelineHovered = true;
            clearTimeout(timelineTimeout);
        });

        document.getElementById('timeline').addEventListener('mouseleave', () => {
            isTimelineHovered = false;
            updateTimelineUI(); // Re-triggers the hide timeout
        });

        // "Near-Right" Detection: Show timeline when cursor is near the right edge
        window.addEventListener('mousemove', (e) => {
            const isNearRight = (window.innerWidth - e.clientX) < 60;
            if (isNearRight) {
                updateTimelineUI();
            }
        });

        // Hover Date Preview
        document.getElementById('timeline').addEventListener('mousemove', (e) => {
            const timeline = document.getElementById('timeline');
            const preview = document.getElementById('timeline-preview');
            const previewText = document.getElementById('timeline-preview-text');
            const rect = timeline.querySelector('.timeline-track').getBoundingClientRect();

            let percent = (e.clientY - rect.top) / rect.height;
            percent = Math.max(0, Math.min(1, percent));

            // Move preview visually to follow cursor
            preview.style.top = `${percent * 100}%`;

            // Calculate date at this "projected" position
            const targetIdx = Math.floor(percent * (items.length - 1));
            const targetItem = items[targetIdx];
            const media = targetItem?.querySelector('img, video');
            const source = media ? (media.src || media.getAttribute('data-src') || '') : '';
            const match = source.match(/(\d{4})(\d{2})(\d{2})/);
            if (match) {
                previewText.textContent = `${match[1]}-${match[2]}-${match[3]}`;
            }

            // Sync main handle ONLY if scrubbing
            if (isScrubbing) {
                const handle = document.getElementById('timeline-handle');
                handle.style.top = `${percent * 100}%`;

                gallery.scrollTop = percent * (gallery.scrollHeight - gallery.clientHeight);
                updateTimelineUI(); // Update the main tooltip live
            }
        });

        // Scrubbing/Clicking logic
        function handleTimelineAction(e) {
            const timeline = document.getElementById('timeline');
            const rect = timeline.querySelector('.timeline-track').getBoundingClientRect();
            // Support both touch and mouse
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            let percent = (clientY - rect.top) / rect.height;
            percent = Math.max(0, Math.min(1, percent));

            gallery.scrollTop = percent * (gallery.scrollHeight - gallery.clientHeight);
            updateTimelineUI();
        }

        document.getElementById('timeline').addEventListener('mousedown', (e) => {
            isScrubbing = true;
            handleTimelineAction(e); // Jump immediately on click

            const onMouseUp = () => {
                isScrubbing = false;
                window.removeEventListener('mouseup', onMouseUp);
                updateTimelineUI();
            };

            window.addEventListener('mouseup', onMouseUp);
        });

        // Touch support for mobile scrubbing
        document.getElementById('timeline').addEventListener('touchstart', (e) => {
            isScrubbing = true;
            handleTimelineAction(e);

            const onTouchEnd = () => {
                isScrubbing = false;
                window.removeEventListener('touchend', onTouchEnd);
                updateTimelineUI();
            };

            window.addEventListener('touchend', onTouchEnd);
        }, { passive: false });

        // Scroll Forwarding: Allow mouse wheel to scroll gallery while hovering timeline
        document.getElementById('timeline').addEventListener('wheel', (e) => {
            gallery.scrollTop += e.deltaY;
        }, { passive: true });

        // Start loading sequence
        loadGallery();
    </script>
</body>
</html>
