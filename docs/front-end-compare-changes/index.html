<style>
  :root {
    --bg: #0a0a0c;
    --panel: rgba(255, 255, 255, 0.03);
    --accent: #8b5cf6;
    --text: #e2e8f0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 2rem;
  }

  .header {
    margin-bottom: 2rem;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 1rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(500px, 1fr));
    gap: 2rem;
  }

  .card {
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 1.5rem;
    backdrop-filter: blur(10px);
  }

  .card h3 {
    margin-top: 0;
    font-weight: 500;
    color: var(--accent);
    text-transform: capitalize;
  }

  .compare-container {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .img-base, .img-current {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* "Difference" overlay technique */
  .mode-diff .img-current {
    mix-blend-mode: difference;
    filter: invert(1);
  }

  .mode-overlay .img-current {
    opacity: 0.5;
  }

  .mode-side .compare-container {
    display: flex;
  }
  .mode-side .img-base, .mode-side .img-current {
    position: relative;
    width: 50%;
  }

  .controls {
    margin-top: 1rem;
    display: flex;
    gap: 0.5rem;
  }

  button {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
    transition: all 0.2s;
  }

  button.active {
    background: var(--accent);
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem;
    color: #666;
    border: 2px dashed rgba(255,255,255,0.05);
    border-radius: 12px;
  }
</style>

<div class="header">
  <h1>Visual QA Dashboard</h1>
  <p>Run <code>npm run qa-capture</code> to update screenshots.</p>
</div>

<div class="grid" id="qa-grid">
  <div class="empty-state">
    <p>No screenshots found in <code>/screenshots/</code></p>
    <p>Capture screenshots to begin comparison.</p>
  </div>
</div>

<script>
  // Since we are in a static site, we can't easily list files.
  // We'll use a small trick: the user can paste their config tasks here
  // or we can try to guess common ones.
  // For now, I'll provide a way to 'Load' tasks.

  const tasks = ['home']; // Default example
  const envs = ['local', 'prod'];

  function renderTasks() {
    const grid = document.getElementById('qa-grid');
    if (tasks.length > 0) grid.innerHTML = '';

    tasks.forEach(task => {
      const card = document.createElement('div');
      card.className = 'card mode-diff';
      card.id = `task-${task}`;
      card.innerHTML = `
        <h3>${task}</h3>
        <div class="compare-container">
          <img src="/screenshots/prod/${task}.png" class="img-base" alt="Baseline">
          <img src="/screenshots/local/${task}.png" class="img-current" alt="Current">
        </div>
        <div class="controls">
          <button class="active" onclick="setMode('${task}', 'diff', this)">Difference</button>
          <button onclick="setMode('${task}', 'overlay', this)">Overlay</button>
          <button onclick="setMode('${task}', 'side', this)">Side-by-Side</button>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function setMode(task, mode, btn) {
    const card = document.getElementById(`task-${task}`);
    card.className = `card mode-${mode}`;

    card.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // Auto-render
  renderTasks();
</script>
